name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build for Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o sentoris-proxy-linux-amd64 ./cmd/sentoris-proxy

      - name: Build for Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o sentoris-proxy-linux-arm64 ./cmd/sentoris-proxy

      - name: Build for macOS amd64
        run: GOOS=darwin GOARCH=amd64 go build -o sentoris-proxy-darwin-amd64 ./cmd/sentoris-proxy

      - name: Build for macOS arm64
        run: GOOS=darwin GOARCH=arm64 go build -o sentoris-proxy-darwin-arm64 ./cmd/sentoris-proxy

      - name: Create checksums
        run: |
          sha256sum sentoris-proxy-linux-amd64 > sentoris-proxy-linux-amd64.sha256
          sha256sum sentoris-proxy-linux-arm64 > sentoris-proxy-linux-arm64.sha256
          sha256sum sentoris-proxy-darwin-amd64 > sentoris-proxy-darwin-amd64.sha256
          sha256sum sentoris-proxy-darwin-arm64 > sentoris-proxy-darwin-arm64.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sentoris-proxy-linux-amd64
            sentoris-proxy-linux-amd64.sha256
            sentoris-proxy-linux-arm64
            sentoris-proxy-linux-arm64.sha256
            sentoris-proxy-darwin-amd64
            sentoris-proxy-darwin-amd64.sha256
            sentoris-proxy-darwin-arm64
            sentoris-proxy-darwin-arm64.sha256
          draft: false
          prerelease: false