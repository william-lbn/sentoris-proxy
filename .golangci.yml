run:
  timeout: 5m
  modules-download-mode: readonly
  go: "1.24"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - gocritic

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
    - path: "cmd/"
      linters:
        - unparam
    - linters:
        - staticcheck
      text: "possible nil pointer dereference"
    - linters:
        - unparam
      text: "is unused"
    - linters:
        - staticcheck
      text: "HasPrefix doesn't have side effects"
    - linters:
        - gocritic
      text: "ifElseChain: rewrite if-else to switch"
    - linters:
        - staticcheck
      text: "rand.Seed has been deprecated"
    - linters:
        - errcheck
      text: "Error return value of .* is not checked"
    - linters:
        - errcheck
      text: "Error return value is not checked"
    - linters:
        - unparam
      text: "is always nil"
    - linters:
        - unparam
      text: "is never used"
    - linters:
        - unused
      text: "is unused"
